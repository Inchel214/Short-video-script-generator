<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>短视频剧本生成器</title>
    <link rel="stylesheet" href="styles.css?v=7">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>AI帮写需求，一键生成剧本</h1>
            <button id="update-btn" class="update-btn" style="display: none;">
                <span class="update-icon">🔄</span>
                <span class="update-text">有新版本</span>
            </button>
        </header>

        <main class="main-content">
            <div class="left-column">
                <div class="config-card">
                    <h3>API 配置</h3>
                    <div class="config-item">
                        <label for="api-key">
                            API密钥
                            <button type="button" class="toggle-password-btn" id="toggle-api-key-visibility" aria-label="切换 API 密钥显示" aria-pressed="false">
                                <svg class="eye-icon eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg class="eye-icon eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M2 12 Q7 16 12 16 Q17 16 22 12"></path>
                                    <line x1="6" y1="16" x2="6" y2="19"></line>
                                    <line x1="10" y1="17" x2="10" y2="20"></line>
                                    <line x1="14" y1="17" x2="14" y2="20"></line>
                                    <line x1="18" y1="16" x2="18" y2="19"></line>
                                </svg>
                            </button>
                        </label>
                        <div class="input-with-toggle">
                            <input type="password" id="api-key" placeholder="输入火山引擎API密钥">
                        </div>
                    </div>
                    <div class="config-item">
                        <label for="model-name">模型名称</label>
                        <input type="text" id="model-name" value="doubao-seed-1-6-vision-250815">
                    </div>
                </div>

                <div class="chat-card">
                    <div class="chat-header">
                        <div class="chat-header-left">
                            <span class="chat-icon">💬</span>
                            <span class="chat-title">剧本修改助手</span>
                        </div>
                        <button class="btn-clear-chat" id="clear-chat">清空聊天</button>
                    </div>

                    <div class="chat-messages" id="chat-messages">
                        <div class="chat-welcome">
                            <span class="welcome-icon">👋</span>
                            <p>你好！我是你的剧本助手。</p>
                            <p>上传图片后输入要求即可生成剧本。</p>
                            <p>点击分镜后可以引用到这里进行修改。</p>
                        </div>
                    </div>

                    <div class="chat-input-area">
                        <div id="chat-input" class="chat-input-editable" contenteditable="true" placeholder="输入剧本要求（生成）或修改要求（引用后修改）..."></div>
                        <div class="chat-input-toolbar">
                            <button class="btn-upload-image" id="upload-image-btn">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <rect x="3" y="3" width="18" height="18" rx="2"/>
                                    <circle cx="8.5" cy="8.5" r="1.5"/>
                                    <polyline points="21 15 16 10 5 21"/>
                                </svg>
                                <span class="tooltip">添加图片</span>
                            </button>
                            <input type="file" id="chat-file-input" accept="image/*" style="display: none;">
                            <div class="shots-count-input-wrapper">
                                <span class="shots-count-label">镜头数</span>
                                <input type="number" id="shots-count-input" min="1" max="10" placeholder="自动">
                            </div>
                            <button class="btn-send" id="send-chat-btn">发送</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="output-section">
                <div class="loading-section" id="loading" style="display: none;">
                    <div class="loading-spinner"></div>
                    <p>AI 正在生成剧本，请稍候...</p>
                </div>

                <div class="result-section" id="result-section">
                    <div class="result-header">
                        <div class="result-header-left">
                            <div class="result-header-icon">
                                <img src="https://seal-img.nos-jd.163yun.com/obj/w5rCgMKVw6DCmGzCmsK-/80937472743/1778/ced8/0153/7f47f2672201551ad731f4e78a980e2c.png" alt="">
                            </div>
                            <div class="result-header-text">
                                <span class="result-header-title">确认规划</span>
                                <span class="result-header-hint">请确认剧本规范和分镜规划</span>
                            </div>
                        </div>
                    </div>

                    <div class="result-body">
                        <div class="result-card">
                            <div class="result-card-title">
                                <img src="https://seal-img.nos-jd.163yun.com/obj/w5rCgMKVw6DCmGzCmsK-/80937475422/3356/9eaf/f0cf/38d8dc34a735f1b080afb11f6e3aabc1.png" alt="">
                                <div class="result-card-title-text">
                                    <span class="result-card-main-title">剧情简介</span>
                                    <span class="result-card-sub-title">剧情简介和人物设定</span>
                                </div>
                                <img class="arrow-icon" src="https://seal-img.nos-jd.163yun.com/obj/w5rCgMKVw6DCmGzCmsK-/80937478858/c347/651d/afa5/bb9fede252f974bddb880ec051aef1e3.png" alt="展开">
                            </div>
                            <div class="result-card-content">
                                <div class="synopsis-section" id="synopsis-section">
                                    <p class="placeholder">生成的剧本内容将显示在这里...</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="shots-header">
                        <div class="shots-header-left">
                            <img src="https://seal-img.nos-jd.163yun.com/obj/w5rCgMKVw6DCmGzCmsK-/80937478909/b6c5/b104/a247/a5086ce6ff3d02b09e8319554662c0d5.png" alt="">
                            <span>分镜生成</span>
                        </div>
                        <span class="shots-count">共 <span id="shot-count">0</span> 个分镜</span>
                    </div>

                    <div class="shots-list" id="shots-list">
                        <p class="placeholder">分镜内容将显示在这里...</p>
                    </div>

                    <div class="action-buttons">
                        <button class="btn-export" id="export-btn">📄 导出剧本</button>
                        <button class="btn-clear-history" id="clear-history">清空对话历史</button>
                    </div>
                </div>

                <div class="error-section" id="error-section" style="display: none;">
                    <div class="error-content">
                        <h3>出错了</h3>
                        <p id="error-message"></p>
                        <button class="btn-retry" id="retry-btn">重试</button>
                    </div>
                </div>
            </div>
        </main>

        <footer class="footer">
            <p>短视频剧本生成器 | 基于火山引擎大模型</p>
        </footer>

        <div class="custom-dialog-overlay" id="custom-dialog-overlay" style="display: none;">
            <div class="custom-dialog">
                <div class="custom-dialog-content">
                    <div class="custom-dialog-icon" id="custom-dialog-icon">📋</div>
                    <div class="custom-dialog-title" id="custom-dialog-title">提示</div>
                    <div class="custom-dialog-message" id="custom-dialog-message"></div>
                </div>
                <div class="custom-dialog-buttons">
                    <button class="btn-dialog-cancel" id="btn-dialog-cancel">取消</button>
                    <button class="btn-dialog-confirm" id="btn-dialog-confirm">确定</button>
                </div>
            </div>
        </div>

        <script src="app.js?v=24"></script>
    </div>
</body>
</html>
