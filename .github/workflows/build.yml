name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller
        
      - name: Build Python backend
        run: pyinstaller src/backend/api.py --onefile --name api --console
          
      - name: Cache Node modules
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            ~/.cache/electron
            ~/.cache/electron-builder
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
          
      - name: Install Node dependencies
        run: npm install --prefer-offline --no-audit
          
      - name: Build Electron app
        run: npx electron-builder --win --publish=never
        env:
          ELECTRON_BUILDER_CACHE: ${{ runner.temp }}/electron-builder-cache
          CSC_IDENTITY_AUTO_DISCOVERY: false
        
      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/*.exe
          
      - name: Upload unpacked artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build-unpacked
          path: dist/win-unpacked/
          
      - name: Generate win latest.yml
        run: python scripts/generate_latest_yml.py "dist/*.exe" "dist/latest.yml"
      - name: Upload win latest.yml
        uses: actions/upload-artifact@v4
        with:
          name: win-latest-yml
          path: dist/latest.yml

  build-mac-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller
        
      - name: Install Node dependencies
        run: npm install
        
      - name: Build Python backend
        run: pyinstaller src/backend/api.py --onefile --name api --console
        
      - name: Build Electron app
        run: npx electron-builder --mac --arm64 --publish=never
        
      - name: Generate mac arm64 latest-mac.yml
        run: python3 scripts/generate_latest_yml.py "dist/*.dmg" "dist/latest-mac.yml"
      - name: Upload mac arm64 latest.yml
        uses: actions/upload-artifact@v4
        with:
          name: mac-arm64-latest-yml
          path: dist/latest-mac.yml
        
      - name: Verify DMG structure
        run: |
          DMG_FILE=$(ls dist/*.dmg | head -n 1)
          echo "DMG file: $DMG_FILE"
          
          # 检查 DMG 文件是否存在
          if [ -f "$DMG_FILE" ]; then
            echo "✅ DMG file exists"
          else
            echo "❌ DMG file not found"
            exit 1
          fi
          
          # 检查文件大小（至少 50MB）
          FILE_SIZE=$(stat -f%z "$DMG_FILE")
          if [ "$FILE_SIZE" -gt $((50 * 1024 * 1024)) ]; then
            echo "✅ DMG size is $(($FILE_SIZE / 1024 / 1024)) MB (expected > 50MB)"
          else
            echo "❌ DMG size is too small: $(($FILE_SIZE / 1024 / 1024)) MB"
            exit 1
          fi
          
          # 尝试挂载并检查内容
          mkdir -p /tmp/mnt
          hdiutil attach "$DMG_FILE" -mountpoint /tmp/mnt -noverify -noautoopen -nobrowse -quiet
          
          if [ -d "/tmp/mnt/短视频剧本生成器.app" ]; then
            echo "✅ .app bundle found"
            
            # 检查 Resources 目录是否包含 api
            if [ -f "/tmp/mnt/短视频剧本生成器.app/Contents/Resources/api" ]; then
              echo "✅ api binary found in Resources"
            else
              echo "❌ api binary not found in Resources"
              hdiutil detach /tmp/mnt -force -quiet || true
              exit 1
            fi
          else
            echo "❌ .app bundle not found"
            hdiutil detach /tmp/mnt -force -quiet || true
            exit 1
          fi
          
          for i in 1 2 3; do
            if hdiutil detach /tmp/mnt -force -quiet; then
              echo "✅ DMG detached successfully"
              break
            fi
            echo "⚠️ Detach attempt $i failed, retrying..."
            sleep 2
          done
          echo "✅ All checks passed!"
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-arm64
          path: dist/*.dmg

  build-mac-intel:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller
        
      - name: Install Node dependencies
        run: npm install
        
      - name: Build Python backend
        run: pyinstaller src/backend/api.py --onefile --name api --console
        
      - name: Build Electron app
        run: npx electron-builder --mac --x64 --publish=never
        
      - name: Generate mac intel latest-mac.yml
        run: python3 scripts/generate_latest_yml.py "dist/*.dmg" "dist/latest-mac.yml"
      - name: Upload mac intel latest.yml
        uses: actions/upload-artifact@v4
        with:
          name: mac-intel-latest-yml
          path: dist/latest-mac.yml
        
      - name: Verify DMG structure
        run: |
          DMG_FILE=$(ls dist/*.dmg | head -n 1)
          echo "DMG file: $DMG_FILE"
          
          # 检查 DMG 文件是否存在
          if [ -f "$DMG_FILE" ]; then
            echo "✅ DMG file exists"
          else
            echo "❌ DMG file not found"
            exit 1
          fi
          
          # 检查文件大小（至少 50MB）
          FILE_SIZE=$(stat -f%z "$DMG_FILE")
          if [ "$FILE_SIZE" -gt $((50 * 1024 * 1024)) ]; then
            echo "✅ DMG size is $(($FILE_SIZE / 1024 / 1024)) MB (expected > 50MB)"
          else
            echo "❌ DMG size is too small: $(($FILE_SIZE / 1024 / 1024)) MB"
            exit 1
          fi
          
          # 尝试挂载并检查内容
          mkdir -p /tmp/mnt
          hdiutil attach "$DMG_FILE" -mountpoint /tmp/mnt -noverify -noautoopen -nobrowse -quiet
          
          if [ -d "/tmp/mnt/短视频剧本生成器.app" ]; then
            echo "✅ .app bundle found"
            
            # 检查 Resources 目录是否包含 api
            if [ -f "/tmp/mnt/短视频剧本生成器.app/Contents/Resources/api" ]; then
              echo "✅ api binary found in Resources"
            else
              echo "❌ api binary not found in Resources"
              hdiutil detach /tmp/mnt -force -quiet || true
              exit 1
            fi
          else
            echo "❌ .app bundle not found"
            hdiutil detach /tmp/mnt -force -quiet || true
            exit 1
          fi
          
          for i in 1 2 3; do
            if hdiutil detach /tmp/mnt -force -quiet; then
              echo "✅ DMG detached successfully"
              break
            fi
            echo "⚠️ Detach attempt $i failed, retrying..."
            sleep 2
          done
          echo "✅ All checks passed!"
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-intel
          path: dist/*.dmg

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller
        
      - name: Build Python backend
        run: pyinstaller src/backend/api.py --onefile --name api --console
          
      - name: Install Node dependencies
        run: npm install
        
      - name: Build Electron app
        run: npx electron-builder --linux --publish=never
        
      - name: Generate linux latest-linux.yml
        run: python3 scripts/generate_latest_yml.py "dist/*.AppImage" "dist/latest-linux.yml"
      - name: Upload linux latest.yml
        uses: actions/upload-artifact@v4
        with:
          name: linux-latest-yml
          path: dist/latest-linux.yml
        
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-build
          path: dist/*.AppImage

  release:
    needs: [build-windows, build-mac-arm64, build-mac-intel, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows
          
      - uses: actions/download-artifact@v4
        with:
          name: windows-build-unpacked
          path: windows-unpacked

      - uses: actions/download-artifact@v4
        with:
          name: win-latest-yml
          path: windows

      - uses: actions/download-artifact@v4
        with:
          name: mac-build-arm64
          path: mac-arm64

      - uses: actions/download-artifact@v4
        with:
          name: mac-build-intel
          path: mac-intel

      - uses: actions/download-artifact@v4
        with:
          name: mac-arm64-latest-yml
          path: mac-arm64

      - uses: actions/download-artifact@v4
        with:
          name: mac-intel-latest-yml
          path: mac-intel

      - uses: actions/download-artifact@v4
        with:
          name: linux-build
          path: linux

      - uses: actions/download-artifact@v4
        with:
          name: linux-latest-yml
          path: linux

      - name: List files to upload
        run: |
          echo "=== Windows files ==="
          find windows -type f 2>/dev/null || ls -la windows
          echo "=== Mac ARM64 files ==="
          find mac-arm64 -type f 2>/dev/null || ls -la mac-arm64
          echo "=== Mac Intel files ==="
          find mac-intel -type f 2>/dev/null || ls -la mac-intel
          echo "=== Linux files ==="
          find linux -type f 2>/dev/null || ls -la linux
          
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_id }}-${{ github.run_number }}
          name: Release ${{ github.run_number }} (${{ github.run_id }})
          body: "Automatic build from GitHub Actions"
          overwrite: true
          fail_on_unmatched_files: false
          files: |
            windows/*.exe
            windows/latest.yml
            mac-arm64/*.dmg
            mac-arm64/latest-mac.yml
            mac-intel/*.dmg
            mac-intel/latest-mac.yml
            linux/*.AppImage
            linux/latest-linux.yml
