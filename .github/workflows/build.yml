name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build
        run: python -m PyInstaller build.spec --noconfirm
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/短视频剧本生成器/

  build-mac:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python (arm64 native)
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      
      - name: Build arm64 version
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          python -m PyInstaller build.spec --noconfirm
          mv dist/短视频剧本生成器 dist/短视频剧本生成器_arm64
      
      - name: Set up Rosetta environment for x86_64 build
        run: |
          # Install Rosetta if needed
          softwareupdate --install-rosetta --agree-to-license || true
          
      - name: Build x86_64 version via Rosetta
        run: |
          # Run in Rosetta environment
          arch -x86_64 /bin/bash -c "
            # Clean up previous builds
            rm -rf build dist/短视频剧本生成器
            
            # Reinstall dependencies in Rosetta environment
            arch -x86_64 python3 -m pip install --force-reinstall --no-cache-dir -r requirements.txt
            arch -x86_64 python3 -m pip install --force-reinstall --no-cache-dir pyinstaller
            
            # Build for x86_64
            arch -x86_64 python3 -m PyInstaller build.spec --noconfirm
            mv dist/短视频剧本生成器 dist/短视频剧本生成器_x86_64
          "
      
      - name: Create Universal2 binary
        run: |
          # Start with arm64 as base
          cp -r dist/短视频剧本生成器_arm64 dist/短视频剧本生成器_universal2
          
          # Find the main executable (should be in the directory directly)
          MAIN_EXEC="短视频剧本生成器"
          
          # Create Universal2 by combining both architectures
          lipo -create \
            dist/短视频剧本生成器_arm64/"$MAIN_EXEC" \
            dist/短视频剧本生成器_x86_64/"$MAIN_EXEC" \
            -output dist/短视频剧本生成器_universal2/"$MAIN_EXEC"
          
          # Verify the universal binary
          file dist/短视频剧本生成器_universal2/"$MAIN_EXEC"
      
      - name: Upload arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-arm64
          path: dist/短视频剧本生成器_arm64/
      
      - name: Upload x86_64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-intel
          path: dist/短视频剧本生成器_x86_64/
      
      - name: Upload Universal2 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-universal2
          path: dist/短视频剧本生成器_universal2/

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows
          
      - uses: actions/download-artifact@v4
        with:
          name: mac-build-intel
          path: mac-intel

      - uses: actions/download-artifact@v4
        with:
          name: mac-build-arm64
          path: mac-arm64
      
      - uses: actions/download-artifact@v4
        with:
          name: mac-build-universal2
          path: mac-universal2
          
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/**/*
            mac-intel/**/*
            mac-arm64/**/*
            mac-universal2/**/*