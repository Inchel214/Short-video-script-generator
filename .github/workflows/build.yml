name: Build Multi-Platform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build
        run: python -m PyInstaller build.spec --noconfirm
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: dist/短视频剧本生成器/

  build-mac:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runs-on: macos-13
            artifact-name: mac-build-intel
          - runs-on: macos-14
            artifact-name: mac-build-arm64
    runs-on: ${{ matrix.runs-on }}
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller
          
      - name: Build
        run: python -m PyInstaller build.spec --noconfirm
          
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact-name }}
          path: dist/短视频剧本生成器/

  release:
    needs: [build-windows, build-mac]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: windows
          
      - uses: actions/download-artifact@v4
        with:
          name: mac-build-intel
          path: mac-intel

      - uses: actions/download-artifact@v4
        with:
          name: mac-build-arm64
          path: mac-arm64
          
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            windows/**/*
            mac-intel/**/*
            mac-arm64/**/*